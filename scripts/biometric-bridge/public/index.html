<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaskPro Attendance Kiosk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Design -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    
    <div class="kiosk-container">
        <!-- Idle State -->
        <div id="idle-view" class="view active">
            <div class="logo-container">
                <img src="https://hris.maskpro.ph/maskpro_logo.png" alt="MaskPro Logo" class="logo">
                <h1 class="brand-text">MaskPro <span class="brand-accent">HRIS</span></h1>
            </div>
            
            <div class="clock-container">
                <div id="clock-time" class="clock-time">00:00:00</div>
                <div id="clock-date" class="clock-date">Loading date...</div>
            </div>

            <div class="instruction">
                <div class="pulse-ring"></div>
                <h2>Please place your finger on the scanner</h2>
            </div>
        </div>

        <!-- Active Punch State -->
        <div id="punch-view" class="view">
            <div class="glass-card">
                <div class="profile-section">
                    <div class="avatar-ring">
                        <img id="punch-avatar" src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff" alt="Profile" class="avatar-img">
                    </div>
                    <h2 id="punch-name" class="employee-name">John Doe</h2>
                    <p id="punch-title" class="employee-title">Senior Technician</p>
                </div>

                <div class="status-section">
                    <div class="status-badge success">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                        Attendance Recorded
                    </div>
                    <div id="punch-timestamp" class="punch-time">08:05 AM</div>
                </div>

                <div class="motivation-section">
                    <p id="bible-verse" class="bible-verse">"Commit your work to the Lord, and your plans will be established."</p>
                    <p id="bible-ref" class="bible-ref">- Proverbs 16:3</p>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
